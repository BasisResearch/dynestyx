[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dynestyx"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cd-dynamax",
    "effectful",
    "numpyro>=0.19.0",
]

[tool.hatch.build.targets.wheel]
packages = ["dsx"]

[tool.uv.sources]
effectful = { git = "ssh://git@github.com/BasisResearch/effectful.git" }
cd-dynamax = { git = "https://github.com/hd-UQ/cd_dynamax.git" }
