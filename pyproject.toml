[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dynestyx"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "cd-dynamax",
    "effectful",
    "matplotlib>=3.10.7",
    "numpyro>=0.19.0",
    "pytest>=9.0.1",
]

[tool.hatch.build.targets.wheel]
packages = ["dsx"]

[tool.uv.sources]
effectful = { git = "https://github.com/BasisResearch/effectful.git" }
cd-dynamax = { git = "https://github.com/hd-UQ/cd_dynamax.git", branch = "dev-numpyro-api" }
