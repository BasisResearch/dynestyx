name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - 'staging-*'
      - '*'
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.3"
          enable-cache: true

      - name: Install Python dependencies
        run: |
          uv sync --all-extras --dev

      - name: Build package
        run: uv build

      - name: Run tests
        env:
          MKL_NUM_THREADS: 1
        run: uv run ./scripts/test.sh
